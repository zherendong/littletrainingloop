task: spelling_bee
dataset_path: json
dataset_kwargs:
  data_files: spelling_benchmark/spelling_bee.jsonl
output_type: generate_until
training_split: null
validation_split: null
test_split: train
doc_to_text: "{{input}}"
doc_to_target: "{{target}}"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
generation_kwargs:
  until:
    - "\n"
  max_gen_toks: 32
